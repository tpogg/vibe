<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1V9</title>
  <meta name="description" content="1V9">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪙</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0a1a;
      --purple: #6c3ce0;
      --pink: #f472b6;
      --blue: #60a5fa;
      --white: #f0eef6;
      --dim: #6b6580;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* ── bg shapes ── */
    .bg-shapes {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s ease-in-out infinite;
    }

    .shape-1 {
      width: 600px; height: 600px;
      background: var(--purple);
      top: -20%; left: -10%;
      animation-delay: 0s;
    }
    .shape-2 {
      width: 500px; height: 500px;
      background: var(--pink);
      bottom: -15%; right: -10%;
      animation-delay: -7s;
    }
    .shape-3 {
      width: 400px; height: 400px;
      background: var(--blue);
      top: 30%; right: 20%;
      animation-delay: -14s;
      opacity: 0.08;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -40px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ── noise ── */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px;
    }

    /* ── layout ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── coin ── */
    .coin-wrap {
      position: relative;
      margin-bottom: 48px;
    }

    .coin {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #6c3ce0, #f472b6, #60a5fa, #6c3ce0);
      padding: 4px;
      animation: spin-slow 12s linear infinite;
      position: relative;
    }

    .coin-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1030, #2d1b4e);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .coin-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(244,114,182,0.3), transparent 60%);
    }

    .coin-text {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -3px;
      color: white;
      text-shadow: 0 2px 20px rgba(108,60,224,0.5);
      z-index: 1;
      position: relative;
    }

    .coin-text span {
      font-size: 52px;
      color: var(--pink);
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .coin-glow {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,60,224,0.2), transparent 70%);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    /* ── text ── */
    .title {
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 300;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
      text-align: center;
    }

    .tagline {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: -2px;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--white) 0%, var(--pink) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-family: 'Inter', sans-serif;
      font-size: clamp(14px, 1.5vw, 17px);
      font-weight: 300;
      color: var(--dim);
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    /* ── ticker ── */
    .ticker {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      border: 1px solid rgba(108,60,224,0.2);
      border-radius: 100px;
      background: rgba(108,60,224,0.06);
      margin-bottom: 48px;
      animation: border-glow 4s ease-in-out infinite;
    }

    @keyframes border-glow {
      0%, 100% { border-color: rgba(108,60,224,0.15); }
      50% { border-color: rgba(244,114,182,0.3); }
    }

    .ticker-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .ticker-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── cta ── */
    .cta-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 36px;
      border-radius: 100px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white;
      box-shadow: 0 4px 30px rgba(108,60,224,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(108,60,224,0.5);
    }

    .btn-ghost {
      background: transparent;
      color: var(--dim);
      border: 1px solid rgba(108,60,224,0.2);
    }

    .btn-ghost:hover {
      border-color: var(--pink);
      color: var(--white);
    }

    /* ── bottom ── */
    .bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(107,101,128,0.5);
      letter-spacing: 1px;
    }

    .bottom a {
      color: rgba(107,101,128,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }

    .bottom a:hover {
      color: var(--pink);
    }

    /* ── floating geo shapes ── */
    .geo {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      opacity: 0.06;
    }

    .geo-ring {
      width: 160px;
      height: 160px;
      border: 2px solid var(--blue);
      border-radius: 50%;
      top: 12%;
      right: 8%;
      animation: float 15s ease-in-out infinite;
    }

    .geo-square {
      width: 60px;
      height: 60px;
      border: 2px solid var(--pink);
      top: 20%;
      left: 8%;
      transform: rotate(45deg);
      animation: float 18s ease-in-out infinite reverse;
    }

    .geo-dot {
      width: 12px;
      height: 12px;
      background: var(--purple);
      border-radius: 50%;
      bottom: 25%;
      left: 15%;
      animation: float 10s ease-in-out infinite;
      animation-delay: -5s;
    }

    .geo-line {
      width: 80px;
      height: 2px;
      background: var(--pink);
      bottom: 35%;
      right: 12%;
      animation: float 12s ease-in-out infinite;
      animation-delay: -3s;
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .coin { width: 160px; height: 160px; }
      .coin-text { font-size: 48px; }
      .coin-text span { font-size: 38px; }
      .bottom { padding: 16px 20px; flex-direction: column; gap: 8px; }
    }

    /* ── custom cursor trail ── */
    .cursor-trail {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      background: var(--pink);
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="noise"></div>

  <div class="geo geo-ring"></div>
  <div class="geo geo-square"></div>
  <div class="geo geo-dot"></div>
  <div class="geo geo-line"></div>

  <div class="page">
    <div class="coin-wrap">
      <div class="coin-glow"></div>
      <div class="coin">
        <div class="coin-inner">
          <div class="coin-text">1<span>v</span>9</div>
        </div>
      </div>
    </div>

    <div class="title">something is coming</div>

    <div class="tagline">carry everything.</div>

    <div class="sub">you already know what this is. if you don't, you will.</div>

    <div class="ticker">
      <div class="ticker-dot"></div>
      <div class="ticker-text">launching soon</div>
    </div>

    <div class="cta-row">
      <a href="https://x.com" target="_blank" class="btn btn-primary">follow the signal</a>
      <a href="mailto:hello@1v9.ai" class="btn btn-ghost">inquiries</a>
    </div>
  </div>

  <div class="bottom">
    <span>1v9.ai</span>
    <span>this domain may be available — <a href="mailto:hello@1v9.ai">inquire</a></span>
  </div>

  <script>
    // Cursor trail
    const trails = [];
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('div');
      el.className = 'cursor-trail';
      document.body.appendChild(el);
      trails.push({ el, x: 0, y: 0 });
    }

    let mx = 0, my = 0;
    document.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
      trails.forEach(t => t.el.style.opacity = '0.4');
    });

    function animateTrails() {
      let x = mx, y = my;
      trails.forEach((t, i) => {
        const speed = 0.15 - i * 0.02;
        t.x += (x - t.x) * speed;
        t.y += (y - t.y) * speed;
        t.el.style.left = t.x - 3 + 'px';
        t.el.style.top = t.y - 3 + 'px';
        t.el.style.transform = `scale(${1 - i * 0.12})`;
        t.el.style.opacity = `${0.4 - i * 0.06}`;
        x = t.x;
        y = t.y;
      });
      requestAnimationFrame(animateTrails);
    }
    animateTrails();

    // Parallax shapes on mouse
    const shapes = document.querySelectorAll('.shape');
    document.addEventListener('mousemove', (e) => {
      const cx = e.clientX / window.innerWidth - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      shapes.forEach((s, i) => {
        const d = (i + 1) * 15;
        s.style.transform = `translate(${cx * d}px, ${cy * d}px)`;
      });
    });
  </script>
</body>
</html>
