<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIBE TERMINAL v1.0</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --dim-green: #00aa2a;
      --dark-green: #003b0e;
      --bg: #0a0a0a;
      --amber: #ffb000;
      --red: #ff3c3c;
      --cyan: #00e5ff;
      --magenta: #ff00ff;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #crt-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 9;
    }

    #terminal {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow: hidden;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--dim-green) transparent;
    }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-thumb { background: var(--dim-green); }

    .line { white-space: pre-wrap; word-break: break-all; margin: 0; }
    .line-green { color: var(--green); }
    .line-dim { color: var(--dim-green); }
    .line-amber { color: var(--amber); }
    .line-red { color: var(--red); }
    .line-cyan { color: var(--cyan); }
    .line-magenta { color: var(--magenta); }
    .line-white { color: #fff; }

    #input-row {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--dark-green);
      padding-top: 10px;
      margin-top: 4px;
      flex-shrink: 0;
    }

    #prompt { color: var(--green); margin-right: 6px; white-space: nowrap; }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: inherit;
      font-size: inherit;
      caret-color: var(--green);
    }

    #input::selection { background: var(--dark-green); }

    /* Matrix canvas overlay */
    #matrix-canvas {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: black;
    }

    #matrix-exit {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 21;
      color: var(--green);
      font-family: inherit;
      font-size: 12px;
      opacity: 0.7;
    }

    /* Snake game */
    #snake-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #snake-header {
      color: var(--green);
      font-size: 18px;
      margin-bottom: 12px;
      letter-spacing: 4px;
    }

    #snake-score-display {
      color: var(--amber);
      margin-bottom: 8px;
      font-size: 13px;
    }

    #snake-canvas {
      border: 1px solid var(--dim-green);
      image-rendering: pixelated;
    }

    #snake-msg {
      color: var(--red);
      margin-top: 10px;
      font-size: 12px;
      height: 20px;
    }

    #snake-controls {
      color: var(--dim-green);
      margin-top: 8px;
      font-size: 11px;
    }

    /* Typewriter blink */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor::after { content: '█'; animation: blink 1s infinite; margin-left: 1px; }

    /* ASCII art colors */
    .logo { color: var(--green); }

    /* Progress bar animation */
    @keyframes fill { from{width:0} to{width:100%} }

    #fortune-display {
      border: 1px solid var(--dim-green);
      padding: 10px 16px;
      margin: 4px 0;
      color: var(--amber);
      position: relative;
    }
  </style>
</head>

const output = document.getElementById('output');

function print(text, cls = 'line-green', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'line ' + cls;
      el.textContent = text;
      output.appendChild(el);
      output.scrollTop = output.scrollHeight;
      resolve();
    }, delay);
  });
}

function printRaw(html, cls = 'line-green', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'line ' + cls;
      el.innerHTML = html;
      output.appendChild(el);
      output.scrollTop = output.scrollHeight;
      resolve();
    }, delay);
  });
}

async function printLines(lines, cls = 'line-green', baseDelay = 0, step = 0) {
  for (let i = 0; i < lines.length; i++) {
    await print(lines[i], cls, baseDelay + i * step);
  }
}

function blank(delay = 0) { return print('', 'line-green', delay); }

function echoCmd(cmd) {
  print(`visitor@vibe:~$ ${cmd}`, 'line-dim');
}

COMMANDS.matrix = () => {
  const canvas = document.getElementById('matrix-canvas');
  const matExit = document.getElementById('matrix-exit');
  canvas.style.display = 'block';
  matExit.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const fontSize = 14;
  const cols = Math.floor(canvas.width / fontSize);
  const drops = Array(cols).fill(1);
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';

  let animId;
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    animId = requestAnimationFrame(draw);
  }
  animId = requestAnimationFrame(draw);

  function exitMatrix(e) {
    if (e.key === 'Escape' || e.key === 'q' || e.key === 'Q') {
      cancelAnimationFrame(animId);
      canvas.style.display = 'none';
      matExit.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      document.removeEventListener('keydown', exitMatrix);
      input.focus();
      print('  [ exited matrix ]', 'line-dim');
    }
  }
  document.addEventListener('keydown', exitMatrix);
  print('  [ matrix mode — press ESC or Q to exit ]', 'line-dim');
};

// ─── Snake ────────────────────────────────────────────────────────────────────
COMMANDS.snake = () => {
  const overlay = document.getElementById('snake-overlay');
  const canvas  = document.getElementById('snake-canvas');
  const scoreEl = document.getElementById('snake-score-display');
  const msgEl   = document.getElementById('snake-msg');
  overlay.style.display = 'flex';

  const CELL = 20;
  const COLS = 20;
  const ROWS = 20;
  const ctx  = canvas.getContext('2d');

  let snake, dir, nextDir, food, score, highScore = 0, gameLoop, alive;

  function reset() {
    snake   = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir     = {x:1,y:0};
    nextDir = {x:1,y:0};
    food    = randomFood();
    score   = 0;
    alive   = true;
    msgEl.textContent = '';
    updateScore();
  }

  function randomFood() {
    let f;
    do {
      f = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===f.x && s.y===f.y));
    return f;
  }

  function updateScore() {
    scoreEl.textContent = `SCORE: ${score} | HIGH SCORE: ${highScore}`;
  }

  function draw() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = '#001a05';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        ctx.strokeRect(c*CELL, r*CELL, CELL, CELL);
      }
    }

    // food
    ctx.fillStyle = '#ff3c3c';
    ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);

    // snake
    for (let i = 0; i < snake.length; i++) {
      const s = snake[i];
      ctx.fillStyle = i===0 ? '#00ff41' : '#00aa2a';
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    }
  }

  function step() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
        snake.some(s => s.x===head.x && s.y===head.y)) {
      alive = false;
      if (score > highScore) highScore = score;
      updateScore();
      clearInterval(gameLoop);
      msgEl.textContent = `GAME OVER — SCORE: ${score}  [ press R to restart ]`;
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      updateScore();
      food = randomFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function onKey(e) {
    const map = {
      ArrowUp:'U', ArrowDown:'D', ArrowLeft:'L', ArrowRight:'R',
      w:'U', s:'D', a:'L', d:'R',
      W:'U', S:'D', A:'L', D:'R',
    };
    const d = map[e.key];
    if (d) {
      e.preventDefault();
      const dirs = {U:{x:0,y:-1},D:{x:0,y:1},L:{x:-1,y:0},R:{x:1,y:0}};
      const nd = dirs[d];
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    }
    if (e.key === 'r' || e.key === 'R') {
      clearInterval(gameLoop);
      reset();
      draw();
      gameLoop = setInterval(step, 120);
    }
    if (e.key === 'Escape') {
      clearInterval(gameLoop);
      document.removeEventListener('keydown', onKey);
      overlay.style.display = 'none';
      input.focus();
      print('  [ snake exited ]', 'line-dim');
    }
  }

  document.addEventListener('keydown', onKey);
  reset();
  draw();
  gameLoop = setInterval(step, 120);
};

// ─── Input handling ───────────────────────────────────────────────────────────
input.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim().toLowerCase();
    input.value = '';
    histIdx = -1;

    echoCmd(cmd);

    if (!cmd) return;
    history.unshift(cmd);

    if (COMMANDS[cmd]) {
      await COMMANDS[cmd]();
    } else {
      await blank();
      await print(`  command not found: ${cmd}`, 'line-red');
      await print('  type  help  for available commands', 'line-dim');
      await blank();
    }
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) histIdx++;
    input.value = history[histIdx] || '';
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; input.value = ''; }
    input.value = histIdx >= 0 ? history[histIdx] : '';
  }

  if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    await COMMANDS.clear();
  }
});

// keep focus on input
document.addEventListener('click', () => {
  if (document.getElementById('snake-overlay').style.display === 'flex') return;
  if (document.getElementById('matrix-canvas').style.display === 'block') return;
  input.focus();
});

// ─── Start ────────────────────────────────────────────────────────────────────
boot();
</script>
