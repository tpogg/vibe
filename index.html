<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1v9.ai — Premium Domain For Sale</title>
  <meta name="description" content="The premium domain 1v9.ai is available for purchase. A short, memorable AI domain perfect for your next venture." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050510;
      --surface: #0a0a1a;
      --border: rgba(255, 255, 255, 0.06);
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --accent-light: #a29bfe;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Radial glow behind domain */
    .glow {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.5;
    }

    main {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 640px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-light);
      background: rgba(108, 92, 231, 0.08);
      margin-bottom: 40px;
    }

    .domain {
      font-size: clamp(56px, 12vw, 96px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, var(--accent-light) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-dim);
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .highlights {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .highlight {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      min-width: 140px;
      flex: 1;
    }

    .highlight-value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .highlight-label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cta-button {
      display: inline-block;
      padding: 16px 40px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px var(--accent-glow);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    .contact-alt {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .contact-alt a {
      color: var(--accent-light);
      text-decoration: none;
    }

    .contact-alt a:hover {
      text-decoration: underline;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* Entrance animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge { animation: fadeUp 0.6s ease both; animation-delay: 0.1s; }
    .domain { animation: fadeUp 0.6s ease both; animation-delay: 0.2s; }
    .tagline { animation: fadeUp 0.6s ease both; animation-delay: 0.3s; }
    .highlights { animation: fadeUp 0.6s ease both; animation-delay: 0.4s; }
    .cta-button { animation: fadeUp 0.6s ease both; animation-delay: 0.5s; }
    .contact-alt { animation: fadeUp 0.6s ease both; animation-delay: 0.6s; }
  </style>
</head>
<body>

<div class="glow"></div>

<main>
  <div class="badge">Premium Domain</div>
  <h1 class="domain">1v9.ai</h1>
  <p class="tagline">A short, powerful, and memorable AI domain.<br />Available for purchase.</p>

  <div class="highlights">
    <div class="highlight">
      <div class="highlight-value">4</div>
      <div class="highlight-label">Characters</div>
    </div>
    <div class="highlight">
      <div class="highlight-value">.ai</div>
      <div class="highlight-label">Extension</div>
    </div>
    <div class="highlight">
      <div class="highlight-value">1v9</div>
      <div class="highlight-label">Brandable</div>
    </div>
  </div>

  <a href="mailto:contact@1v9.ai" class="cta-button">Inquire About This Domain</a>
  <p class="contact-alt">or reach out at <a href="mailto:contact@1v9.ai">contact@1v9.ai</a></p>
</main>

<footer>&copy; 2026 1v9.ai</footer>

</body>
</html>
