<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON TERMINAL v0.69</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #33ff33;
      --dim-green: #1a9a1a;
      --bg: #0a0a0a;
      --amber: #ffb000;
      --red: #ff3333;
      --cyan: #00e5ff;
      --magenta: #ff00ff;
      --pink: #ff69b4;
      --pixel-font: 'Press Start 2P', monospace;
      --mono: 'Share Tech Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* CRT Effects */
    #scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none; z-index: 100;
    }

    #crt-glow {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
      pointer-events: none; z-index: 99;
    }

    /* Flicker */
    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.92; }
      99% { opacity: 0.96; }
    }
    body { animation: flicker 4s infinite; }

    /* Header */
    #header {
      border-bottom: 2px solid var(--dim-green);
      padding: 20px 24px 16px;
      position: relative;
    }

    .logo-art {
      font-family: var(--pixel-font);
      font-size: 9px;
      line-height: 1.3;
      color: var(--amber);
      white-space: pre;
      letter-spacing: 1px;
    }

    .tagline {
      font-family: var(--pixel-font);
      font-size: 7px;
      color: var(--dim-green);
      margin-top: 8px;
      letter-spacing: 2px;
    }

    .header-stats {
      position: absolute;
      right: 24px;
      top: 20px;
      text-align: right;
      font-size: 11px;
    }

    .header-stats .label { color: var(--dim-green); }
    .header-stats .val { color: var(--green); }
    .header-stats .val-up { color: var(--green); }
    .header-stats .val-down { color: var(--red); }

    /* Ticker */
    #ticker-wrap {
      overflow: hidden;
      border-bottom: 1px solid var(--dim-green);
      padding: 6px 0;
      background: rgba(0,50,0,0.15);
    }

    #ticker {
      display: flex;
      gap: 40px;
      white-space: nowrap;
      animation: scroll-ticker 30s linear infinite;
      font-family: var(--pixel-font);
      font-size: 8px;
    }

    @keyframes scroll-ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .tick-item { display: inline-flex; gap: 8px; }
    .tick-name { color: var(--amber); }
    .tick-up { color: var(--green); }
    .tick-down { color: var(--red); }

    /* Main */
    #main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      min-height: calc(100vh - 160px);
    }

    /* Coin Table */
    #coin-panel {
      padding: 16px 20px;
      overflow-y: auto;
    }

    .panel-title {
      font-family: var(--pixel-font);
      font-size: 9px;
      color: var(--cyan);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .coin-table {
      width: 100%;
      border-collapse: collapse;
    }

    .coin-table th {
      font-family: var(--pixel-font);
      font-size: 7px;
      color: var(--dim-green);
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--dim-green);
      letter-spacing: 1px;
    }

    .coin-table th.right { text-align: right; }

    .coin-table td {
      padding: 8px;
      border-bottom: 1px solid rgba(0,80,0,0.2);
      vertical-align: middle;
    }

    .coin-row {
      transition: background 0.2s;
      cursor: pointer;
    }

    .coin-row:hover { background: rgba(0,80,0,0.15); }
    .coin-row.selected { background: rgba(0,80,0,0.25); }

    .coin-pixel {
      font-size: 20px;
      line-height: 1;
      image-rendering: pixelated;
    }

    .coin-name {
      font-family: var(--pixel-font);
      font-size: 8px;
      color: var(--green);
    }

    .coin-symbol {
      font-size: 10px;
      color: var(--dim-green);
    }

    .coin-price {
      font-family: var(--pixel-font);
      font-size: 8px;
      text-align: right;
      color: var(--amber);
    }

    .coin-change {
      font-family: var(--pixel-font);
      font-size: 8px;
      text-align: right;
    }

    .coin-change.up { color: var(--green); }
    .coin-change.down { color: var(--red); }

    .coin-mcap {
      font-size: 10px;
      text-align: right;
      color: var(--dim-green);
    }

    .moon-bar-cell { width: 120px; }

    .moon-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .moon-bar {
      flex: 1;
      height: 8px;
      background: rgba(0,40,0,0.5);
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;
    }

    .moon-bar-fill {
      height: 100%;
      transition: width 0.5s;
    }

    .moon-score {
      font-family: var(--pixel-font);
      font-size: 7px;
      min-width: 24px;
      text-align: right;
    }

    /* Sidebar */
    #sidebar {
      border-left: 1px solid var(--dim-green);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .detail-box {
      border: 1px solid var(--dim-green);
      padding: 12px;
    }

    .detail-title {
      font-family: var(--pixel-font);
      font-size: 7px;
      color: var(--cyan);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 11px;
    }

    .detail-label { color: var(--dim-green); }
    .detail-val { color: var(--green); }

    /* Pixel art coin display */
    .pixel-coin-art {
      font-family: var(--pixel-font);
      font-size: 6px;
      line-height: 1;
      color: var(--amber);
      white-space: pre;
      text-align: center;
      margin: 8px 0;
      letter-spacing: 1px;
    }

    /* Mini chart */
    .mini-chart {
      height: 60px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      margin-top: 8px;
    }

    .chart-bar {
      flex: 1;
      background: var(--green);
      min-height: 2px;
      transition: height 0.3s;
      image-rendering: pixelated;
    }

    .chart-bar.down { background: var(--red); }

    /* Activity feed */
    .feed-item {
      font-size: 10px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,80,0,0.15);
    }

    .feed-time { color: var(--dim-green); }
    .feed-action { color: var(--green); }
    .feed-coin { color: var(--amber); }
    .feed-highlight { color: var(--magenta); }

    /* Footer */
    #footer {
      border-top: 1px solid var(--dim-green);
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--dim-green);
    }

    .footer-live {
      color: var(--green);
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .moon-phase { color: var(--amber); }

    /* Glow text */
    .glow {
      text-shadow: 0 0 6px currentColor, 0 0 12px currentColor;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #main { grid-template-columns: 1fr; }
      #sidebar { border-left: none; border-top: 1px solid var(--dim-green); }
      .header-stats { position: static; text-align: left; margin-top: 10px; }
      .moon-bar-cell { display: none; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--dim-green); }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

<div id="scanlines"></div>
<div id="crt-glow"></div>

<div id="header">
  <div class="logo-art" id="logo-art"></div>
  <div class="tagline">TRACK THE MOON. TRUST THE VIBE. DYOR.</div>
  <div class="header-stats" id="header-stats"></div>
</div>

<div id="ticker-wrap">
  <div id="ticker"></div>
</div>

<div id="main">
  <div id="coin-panel">
    <div class="panel-title">MEME COIN RADAR</div>
    <table class="coin-table">
      <thead>
        <tr>
          <th></th>
          <th>COIN</th>
          <th class="right">PRICE</th>
          <th class="right">24H</th>
          <th class="right">MCAP</th>
          <th>MOON SCORE</th>
        </tr>
      </thead>
      <tbody id="coin-tbody"></tbody>
    </table>
  </div>

  <div id="sidebar">
    <div class="detail-box" id="detail-box">
      <div class="detail-title">SELECT A COIN</div>
      <div class="pixel-coin-art" id="coin-art"></div>
      <div id="detail-content">
        <div style="color:var(--dim-green);font-size:11px;text-align:center;margin-top:12px;">
          Click a coin to inspect
        </div>
      </div>
    </div>

    <div class="detail-box">
      <div class="detail-title">PRICE HISTORY</div>
      <div class="mini-chart" id="mini-chart"></div>
    </div>

    <div class="detail-box">
      <div class="detail-title">LIVE FEED</div>
      <div id="feed"></div>
    </div>
  </div>
</div>

<div id="footer">
  <span><span class="footer-live">&#9679;</span> <span id="data-source">CONNECTING...</span></span>
  <span class="moon-phase" id="moon-phase"></span>
  <span>MOON TERMINAL v0.69 | NOT FINANCIAL ADVICE</span>
</div>

<script>
// ─── Coin config (CoinGecko IDs + display) ──────────────────────────────────
const COINS = [
  { id: 'dogecoin',       name: 'DOGECOIN',     sym: 'DOGE',  icon: '\u{1F436}', vibe: 'legendary' },
  { id: 'shiba-inu',      name: 'SHIBA INU',    sym: 'SHIB',  icon: '\u{1F43A}', vibe: 'certified' },
  { id: 'pepe',           name: 'PEPE',         sym: 'PEPE',  icon: '\u{1F438}', vibe: 'ascended' },
  { id: 'bonk',           name: 'BONK',         sym: 'BONK',  icon: '\u{1F9B4}', vibe: 'unhinged' },
  { id: 'floki',          name: 'FLOKI',        sym: 'FLOKI', icon: '\u2694\uFE0F',  vibe: 'viking' },
  { id: 'wojak',          name: 'WOJAK',        sym: 'WOJAK', icon: '\u{1F62D}', vibe: 'feels' },
  { id: 'gigachad-2',     name: 'GIGA CHAD',    sym: 'GIGA',  icon: '\u{1F4AA}', vibe: 'based' },
  { id: 'turbo',          name: 'TURBO',        sym: 'TURBO', icon: '\u{1F40C}', vibe: 'zooming' },
  { id: 'brett',          name: 'BRETT',         sym: 'BRETT', icon: '\u{1F7E6}', vibe: 'based blue' },
  { id: 'dog-go-to-the-moon-rune', name: 'DOG', sym: 'DOG',   icon: '\u{1F415}', vibe: 'runic' },
  { id: 'memecoin-2',     name: 'MEMECOIN',     sym: 'MEME',  icon: '\u{1F680}', vibe: 'meta' },
  { id: 'cat-in-a-dogs-world', name: 'MEW',     sym: 'MEW',   icon: '\u{1F431}', vibe: 'purrfect' },
];

const COINGECKO_IDS = COINS.map(c => c.id).join(',');
const API_URL = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${COINGECKO_IDS}&order=market_cap_desc&sparkline=true&price_change_percentage=1h,24h,7d`;

// ─── Mutable state ──────────────────────────────────────────────────────────
const state = COINS.map(c => ({
  ...c,
  change: 0,
  change1h: 0,
  change7d: 0,
  currentPrice: 0,
  mcap: 0,
  volume: 0,
  history: [],
  moonScore: 50,
  rank: 0,
  ath: 0,
  athChange: 0,
  lastUpdated: null,
}));

let selectedIdx = null;
let isLive = false;
let lastFetch = 0;

// ─── Logo ────────────────────────────────────────────────────────────────────
const LOGO = `
 __  __  ___   ___  _  _
|  \\/  |/ _ \\ / _ \\| \\| |
| |\\/| | (_) | (_) | .  |
|_|  |_|\\___/ \\___/|_|\\_|
 TERMINAL`;

document.getElementById('logo-art').textContent = LOGO.trim();

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1) return '$' + n.toFixed(4);
  const s = n.toFixed(10);
  const match = s.match(/^0\.(0*)/);
  const zeros = match ? match[1].length : 0;
  if (zeros > 4) return `$0.0{${zeros}}${s.slice(2 + zeros, 2 + zeros + 4)}`;
  return '$' + n.toFixed(Math.max(4, zeros + 3));
}

function fmtMcap(n) {
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}

function moonColor(score) {
  if (score >= 80) return 'var(--green)';
  if (score >= 60) return 'var(--amber)';
  if (score >= 40) return 'var(--cyan)';
  return 'var(--red)';
}

// ─── Render table ────────────────────────────────────────────────────────────
const tbody = document.getElementById('coin-tbody');

function renderTable() {
  tbody.innerHTML = '';
  state.forEach((c, i) => {
    const tr = document.createElement('tr');
    tr.className = 'coin-row' + (selectedIdx === i ? ' selected' : '');
    tr.onclick = () => selectCoin(i);

    const chClass = c.change >= 0 ? 'up' : 'down';
    const chSign = c.change >= 0 ? '+' : '';
    const mc = moonColor(c.moonScore);

    tr.innerHTML = `
      <td class="coin-pixel">${c.icon}</td>
      <td><div class="coin-name">${c.name}</div><div class="coin-symbol">${c.sym}</div></td>
      <td class="coin-price">${fmt(c.currentPrice)}</td>
      <td class="coin-change ${chClass}">${chSign}${c.change.toFixed(1)}%</td>
      <td class="coin-mcap">${fmtMcap(c.mcap)}</td>
      <td class="moon-bar-cell">
        <div class="moon-bar-wrap">
          <div class="moon-bar">
            <div class="moon-bar-fill" style="width:${c.moonScore}%;background:${mc}"></div>
          </div>
          <span class="moon-score" style="color:${mc}">${c.moonScore}</span>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ─── Coin detail ─────────────────────────────────────────────────────────────
const PIXEL_ARTS = {
  DOGE: `
  .--.
 / oo \\
( >  < )
 \\ -- /
  '--'`,
  PEPE: `
 .---.
/ o o \\
|  __  |
 \\_  _/
  '--'`,
  default: `
  /\\
 /  \\
/ $$ \\
------`
};

function selectCoin(i) {
  selectedIdx = i;
  const c = state[i];
  const art = PIXEL_ARTS[c.sym] || PIXEL_ARTS.default;

  document.getElementById('coin-art').textContent = art;
  document.getElementById('detail-box').querySelector('.detail-title').textContent = c.icon + ' ' + c.name;

  const chClass = c.change >= 0 ? 'val-up' : 'val-down';
  const chSign = c.change >= 0 ? '+' : '';
  const ch1h = c.change1h >= 0 ? '+' + c.change1h.toFixed(2) : c.change1h.toFixed(2);
  const ch7d = c.change7d >= 0 ? '+' + c.change7d.toFixed(2) : c.change7d.toFixed(2);

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-row"><span class="detail-label">Symbol</span><span class="detail-val">${c.sym}</span></div>
    <div class="detail-row"><span class="detail-label">Price</span><span class="detail-val">${fmt(c.currentPrice)}</span></div>
    <div class="detail-row"><span class="detail-label">1h</span><span class="${c.change1h >= 0 ? 'val-up' : 'val-down'}">${ch1h}%</span></div>
    <div class="detail-row"><span class="detail-label">24h</span><span class="${chClass}">${chSign}${c.change.toFixed(2)}%</span></div>
    <div class="detail-row"><span class="detail-label">7d</span><span class="${c.change7d >= 0 ? 'val-up' : 'val-down'}">${ch7d}%</span></div>
    <div class="detail-row"><span class="detail-label">MCap</span><span class="detail-val">${fmtMcap(c.mcap)}</span></div>
    <div class="detail-row"><span class="detail-label">Volume</span><span class="detail-val">${fmtMcap(c.volume)}</span></div>
    <div class="detail-row"><span class="detail-label">ATH</span><span class="detail-val">${fmt(c.ath)}</span></div>
    <div class="detail-row"><span class="detail-label">From ATH</span><span class="val-down">${c.athChange.toFixed(1)}%</span></div>
    <div class="detail-row"><span class="detail-label">Moon</span><span class="detail-val" style="color:${moonColor(c.moonScore)}">${c.moonScore}/100</span></div>
    <div class="detail-row"><span class="detail-label">Vibe</span><span class="detail-val" style="color:var(--magenta)">${c.vibe}</span></div>
    <div class="detail-row"><span class="detail-label">Rank</span><span class="detail-val">#${c.rank}</span></div>
  `;

  renderChart(c);
  renderTable();
}

// ─── Mini chart ──────────────────────────────────────────────────────────────
function renderChart(c) {
  const chart = document.getElementById('mini-chart');
  chart.innerHTML = '';
  const max = Math.max(...c.history);
  const min = Math.min(...c.history);
  const range = max - min || 1;

  c.history.forEach((v, i) => {
    const bar = document.createElement('div');
    bar.className = 'chart-bar';
    const h = ((v - min) / range) * 52 + 8;
    bar.style.height = h + 'px';
    if (i > 0 && v < c.history[i - 1]) bar.classList.add('down');
    chart.appendChild(bar);
  });
}

// ─── Ticker ──────────────────────────────────────────────────────────────────
function renderTicker() {
  const ticker = document.getElementById('ticker');
  let html = '';
  // duplicate for seamless scroll
  for (let rep = 0; rep < 2; rep++) {
    state.forEach(c => {
      const cls = c.change >= 0 ? 'tick-up' : 'tick-down';
      const sign = c.change >= 0 ? '\u25B2' : '\u25BC';
      html += `<span class="tick-item"><span class="tick-name">${c.sym}</span><span class="${cls}">${fmt(c.currentPrice)} ${sign}${Math.abs(c.change).toFixed(1)}%</span></span>`;
    });
  }
  ticker.innerHTML = html;
}

// ─── Header stats ────────────────────────────────────────────────────────────
function renderHeaderStats() {
  const totalMcap = state.reduce((a, c) => a + c.mcap, 0);
  const totalVol = state.reduce((a, c) => a + c.volume, 0);
  const avgMoon = Math.round(state.reduce((a, c) => a + c.moonScore, 0) / state.length);
  const topCoin = state.reduce((a, c) => c.moonScore > a.moonScore ? c : a);
  const ago = lastFetch ? Math.round((Date.now() - lastFetch) / 1000) + 's ago' : '--';

  document.getElementById('header-stats').innerHTML = `
    <div><span class="label">TOTAL MEME MCAP </span><span class="val">${fmtMcap(totalMcap)}</span></div>
    <div><span class="label">24H VOLUME      </span><span class="val">${fmtMcap(totalVol)}</span></div>
    <div><span class="label">AVG MOON SCORE  </span><span class="val">${avgMoon}/100</span></div>
    <div><span class="label">TOP VIBE        </span><span class="val">${topCoin.icon} ${topCoin.sym}</span></div>
    <div><span class="label">LAST UPDATE     </span><span class="val">${ago}</span></div>
  `;
}

// ─── Live feed ───────────────────────────────────────────────────────────────
const ACTIONS = [
  (c) => `<span class="feed-coin">${c.sym}</span> <span class="feed-action">price ticked ${c.change >= 0 ? 'up' : 'down'}</span>`,
  (c) => `whale bought <span class="feed-coin">${c.sym}</span> <span class="feed-highlight">${fmtMcap(Math.random() * 1e6 + 10000)}</span>`,
  (c) => `<span class="feed-coin">${c.sym}</span> moon score: <span class="feed-highlight">${c.moonScore}</span>`,
  (c) => `new holder joined <span class="feed-coin">${c.sym}</span>`,
  (c) => `<span class="feed-coin">${c.sym}</span> vibe check: <span class="feed-highlight">${c.vibe}</span>`,
  (c) => `<span class="feed-coin">${c.sym}</span> trending on dex`,
  (c) => `<span class="feed-coin">${c.sym}</span> liquidity ${Math.random() > 0.5 ? '+' : '-'}${(Math.random() * 5).toFixed(1)}%`,
];

const feedEl = document.getElementById('feed');
const feedItems = [];

function addFeedItem(customMsg) {
  const c = state[Math.floor(Math.random() * state.length)];
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);

  let msg;
  if (customMsg) {
    msg = `<span class="feed-action">${customMsg}</span>`;
  } else {
    const action = ACTIONS[Math.floor(Math.random() * ACTIONS.length)];
    msg = action(c);
  }

  feedItems.unshift(`<div class="feed-item"><span class="feed-time">${time}</span> ${msg}</div>`);
  if (feedItems.length > 8) feedItems.pop();
  feedEl.innerHTML = feedItems.join('');
}

// ─── Moon phase ──────────────────────────────────────────────────────────────
function getMoonPhase() {
  const phases = ['\u{1F311} NEW', '\u{1F312} WAXING', '\u{1F313} QUARTER', '\u{1F314} GIBBOUS', '\u{1F315} FULL', '\u{1F316} WANING', '\u{1F317} QUARTER', '\u{1F318} CRESCENT'];
  const day = Math.floor(Date.now() / 86400000) % 8;
  return phases[day];
}
document.getElementById('moon-phase').textContent = getMoonPhase();

// ─── Moon Score Algorithm ────────────────────────────────────────────────────
// Computed from real metrics: 24h change, 7d momentum, volume/mcap ratio, ATH distance
function computeMoonScore(c) {
  let score = 50;
  // 24h momentum (up to +/- 20 pts)
  score += Math.max(-20, Math.min(20, c.change * 1.5));
  // 7d trend (up to +/- 15 pts)
  score += Math.max(-15, Math.min(15, c.change7d * 0.5));
  // volume/mcap ratio — high volume = hype (up to +15 pts)
  if (c.mcap > 0) {
    const vmRatio = c.volume / c.mcap;
    score += Math.min(15, vmRatio * 30);
  }
  // ATH distance — closer to ATH = more moon (up to +10 pts)
  if (c.athChange > -20) score += 10;
  else if (c.athChange > -50) score += 5;
  else if (c.athChange < -90) score -= 10;
  return Math.max(1, Math.min(99, Math.round(score)));
}

// ─── CoinGecko Fetch ────────────────────────────────────────────────────────
async function fetchLiveData() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    data.forEach(coin => {
      const idx = state.findIndex(s => s.id === coin.id);
      if (idx === -1) return;
      const s = state[idx];
      s.currentPrice = coin.current_price || 0;
      s.change = coin.price_change_percentage_24h || 0;
      s.change1h = coin.price_change_percentage_1h_in_currency || 0;
      s.change7d = coin.price_change_percentage_7d_in_currency || 0;
      s.mcap = coin.market_cap || 0;
      s.volume = coin.total_volume || 0;
      s.rank = coin.market_cap_rank || 0;
      s.ath = coin.ath || 0;
      s.athChange = coin.ath_change_percentage || 0;
      s.lastUpdated = coin.last_updated;
      // Use 7-day sparkline for history
      if (coin.sparkline_in_7d && coin.sparkline_in_7d.price) {
        s.history = coin.sparkline_in_7d.price;
      }
      s.moonScore = computeMoonScore(s);
    });

    isLive = true;
    lastFetch = Date.now();
    document.getElementById('data-source').textContent = 'LIVE DATA (CoinGecko)';
    document.getElementById('data-source').style.color = 'var(--green)';

    renderAll();
    addFeedItem(`API update: ${data.length} coins refreshed`);
  } catch (err) {
    console.warn('CoinGecko fetch failed:', err.message);
    document.getElementById('data-source').textContent = 'API ERROR — retrying...';
    document.getElementById('data-source').style.color = 'var(--red)';

    // If first load failed, seed with fallback data so the UI isn't empty
    if (!isLive && state[0].currentPrice === 0) {
      seedFallback();
    }
  }
}

// ─── Fallback data if API is blocked ────────────────────────────────────────
function seedFallback() {
  const fallback = {
    'dogecoin': { p: 0.154, mc: 20.1e9 },
    'shiba-inu': { p: 0.0000234, mc: 13.8e9 },
    'pepe': { p: 0.0000089, mc: 3.7e9 },
    'bonk': { p: 0.0000312, mc: 1.9e9 },
    'floki': { p: 0.000187, mc: 1.6e9 },
    'wojak': { p: 0.000042, mc: 420e6 },
    'gigachad-2': { p: 0.00420, mc: 210e6 },
    'turbo': { p: 0.00892, mc: 560e6 },
    'brett': { p: 0.095, mc: 940e6 },
    'dog-go-to-the-moon-rune': { p: 0.0072, mc: 720e6 },
    'memecoin-2': { p: 0.0032, mc: 320e6 },
    'cat-in-a-dogs-world': { p: 0.0038, mc: 380e6 },
  };
  state.forEach(s => {
    const fb = fallback[s.id];
    if (!fb) return;
    s.currentPrice = fb.p;
    s.mcap = fb.mc;
    s.change = (Math.random() - 0.4) * 20;
    s.change1h = (Math.random() - 0.5) * 5;
    s.change7d = (Math.random() - 0.4) * 30;
    s.volume = fb.mc * (0.05 + Math.random() * 0.15);
    s.ath = fb.p * (2 + Math.random() * 10);
    s.athChange = -((1 - fb.p / s.ath) * 100);
    s.history = Array.from({length: 20}, () => fb.p * (0.8 + Math.random() * 0.4));
    s.moonScore = computeMoonScore(s);
  });
  document.getElementById('data-source').textContent = 'OFFLINE MODE (cached data)';
  document.getElementById('data-source').style.color = 'var(--amber)';
  renderAll();
}

// ─── Render all ─────────────────────────────────────────────────────────────
function renderAll() {
  renderTable();
  renderTicker();
  renderHeaderStats();
  if (selectedIdx !== null) selectCoin(selectedIdx);
}

// ─── Init ────────────────────────────────────────────────────────────────────
// Initial fetch
fetchLiveData();

// Re-fetch from API every 60 seconds (CoinGecko free tier: ~30 calls/min)
setInterval(fetchLiveData, 60000);

// Feed items
addFeedItem();
addFeedItem();
addFeedItem();
setInterval(addFeedItem, 4000);
</script>
