<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1V9.AI — Dominate Every Game</title>
  <meta name="description" content="The ultimate AI-powered League of Legends training platform. Practice techniques, analyze replays, climb ranked.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; height: 100%; background: #050508; }

    #boot-screen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #050508;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
      font-family: 'Share Tech Mono', monospace;
    }
    #boot-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .boot-content { text-align: center; }
    #boot-logo {
      color: #00ff41;
      font-size: 10px;
      line-height: 1.2;
      text-shadow: 0 0 20px rgba(0,255,65,0.3);
      margin-bottom: 30px;
      white-space: pre;
    }
    .boot-progress {
      width: 400px;
      max-width: 90vw;
      height: 4px;
      background: rgba(0,255,65,0.06);
      border: 1px solid rgba(0,255,65,0.12);
      margin: 0 auto 16px;
      overflow: hidden;
    }
    #boot-bar {
      height: 100%;
      width: 0%;
      background: #00ff41;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
      transition: width 0.2s linear;
    }
    #boot-text {
      color: #00aa2a;
      font-size: 12px;
      letter-spacing: 2px;
    }

    #main-canvas {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- Boot Screen -->
  <div id="boot-screen">
    <div class="boot-content">
      <pre id="boot-logo"></pre>
      <div class="boot-progress">
        <div id="boot-bar"></div>
      </div>
      <div id="boot-text">INITIALIZING 1V9 NEURAL ENGINE...</div>
    </div>
  </div>

  <!-- The entire UI renders here -->
  <canvas id="main-canvas"></canvas>

  <!-- Data (loaded first, provides global constants) -->
  <script src="js/data.js"></script>

  <!-- App bundle (built from TypeScript) -->
  <script src="dist/bundle.js"></script>
</body>
</html>
